# /etc/nginx/nginx.conf
user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    upstream api_cluster {
        least_conn;
        zone api_zone 64k;
        
        server 10.0.1.10:3001 max_fails=3 fail_timeout=30s;
        server 10.0.1.11:3001 max_fails=3 fail_timeout=30s;
        server 10.0.1.12:3001 max_fails=3 fail_timeout=30s;
        server 10.0.1.13:3001 max_fails=3 fail_timeout=30s;
        server 10.0.1.14:3001 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
    }
    
    upstream socket_cluster {
        zone socket_zone 64k;
        ip_hash;  # Sticky sessions for WebSocket
        
        server 10.0.2.10:3002 max_fails=3 fail_timeout=30s;
        server 10.0.2.11:3002 max_fails=3 fail_timeout=30s;
        server 10.0.2.12:3002 max_fails=3 fail_timeout=30s;
    }
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ride_rate:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    
    server {
        listen 80;
        listen 443 ssl http2;
        server_name api.ridehailing.com;
        
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # Connection limits
        limit_conn conn_limit 10;
        limit_req zone=api_rate burst=50 nodelay;
        
        # API endpoints
        location /api {
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ride request specific rate limit
            if ($request_uri ~* "/api/rides/request") {
                limit_req zone=ride_rate burst=5 nodelay;
            }
        }
        
        # WebSocket endpoints
        location /socket.io/ {
            proxy_pass http://socket_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        
        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}