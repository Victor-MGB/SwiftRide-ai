global
    maxconn 65535
    daemon
    user haproxy
    group haproxy
    tune.ssl.default-dh-param 2048
    stats socket /var/run/haproxy.sock mode 600 level admin
    stats timeout 2m

defaults
    mode http
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout tunnel 1h  # WebSocket long connections
    timeout client-fin 30s
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8

# Frontend for API
frontend api_frontend
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/ridehailing.pem
    redirect scheme https if !{ ssl_fc }
    
    # Rate limiting
    stick-table type ip size 1m expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }
    
    # ACLs for routing
    acl is_api path_beg /api
    acl is_websocket path_beg /socket.io
    acl is_health path_beg /health
    acl is_metrics path_beg /metrics
    
    use_backend api_servers if is_api
    use_backend socket_servers if is_websocket
    use_backend api_servers if is_health
    use_backend api_servers if is_metrics
    
    default_backend api_servers

# Backend for API (HTTP)
backend api_servers
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    # Retry and circuit breaking
    retry-on all-retryable-errors
    retries 3
    option redispatch
    
    # API servers (5 instances)
    server api-1 api-1:3001 check inter 5s rise 2 fall 3
    server api-2 api-2:3001 check inter 5s rise 2 fall 3
    server api-3 api-3:3001 check inter 5s rise 2 fall 3
    server api-4 api-4:3001 check inter 5s rise 2 fall 3
    server api-5 api-5:3001 check inter 5s rise 2 fall 3

# Backend for WebSocket (with sticky sessions)
backend socket_servers
    balance source  # Sticky sessions based on source IP
    option httpchk GET /health
    timeout tunnel 1h
    timeout server 1h
    
    # WebSocket servers (3 instances)
    server socket-1 socket-1:3002 check inter 5s rise 2 fall 3 weight 100
    server socket-2 socket-2:3002 check inter 5s rise 2 fall 3 weight 100
    server socket-3 socket-3:3002 check inter 5s rise 2 fall 3 weight 100

# HAProxy stats page (monitoring)
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats auth admin:SecurePass123
    stats refresh 10s