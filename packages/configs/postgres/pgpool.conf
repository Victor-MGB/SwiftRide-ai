# pgpool.conf - Connection Pooling + Load Balancing
listen_addresses = '*'
port = 5432
socket_dir = '/var/run/pgpool'

# Primary and replica configuration
backend_hostname0 = 'postgres-primary'
backend_port0 = 5432
backend_weight0 = 1
backend_data_directory0 = '/var/lib/postgresql/data'
backend_flag0 = 'ALWAYS_PRIMARY|DISALLOW_TO_FAILOVER'

backend_hostname1 = 'postgres-replica-1'
backend_port1 = 5432
backend_weight1 = 3  # Read replica gets 3x weight for read queries
backend_data_directory1 = '/var/lib/postgresql/data'
backend_flag1 = 'DISALLOW_TO_FAILOVER'

backend_hostname2 = 'postgres-replica-2'
backend_port2 = 5432
backend_weight2 = 3
backend_data_directory2 = '/var/lib/postgresql/data'
backend_flag2 = 'DISALLOW_TO_FAILOVER'

# Load balancing
load_balance_mode = on
master_slave_mode = on
master_slave_sub_mode = 'stream'

# Connection pooling
num_init_children = 128
max_pool = 4
child_life_time = 300
child_max_connections = 1000
connection_life_time = 300

# Health checks
health_check_period = 10
health_check_timeout = 20
health_check_max_retries = 3
health_check_retry_delay = 1

# Failover
failover_on_backend_error = on
search_primary_node_timeout = 10