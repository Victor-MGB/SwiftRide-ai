version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: swiftride_user
      POSTGRES_PASSWORD: 777645dg
      POSTGRES_DB: swiftride
    ports:
      - "5433:5432"          
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftride_user -d swiftride"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

  # OSRM Services
  osrm-backend:
    image: ghcr.io/project-osrm/osrm-backend:latest
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: >
      sh -c "osrm-routed --algorithm mld /data/berlin-latest.osrm"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  osrm-download:
    image: curlimages/curl:latest
    volumes:
      - ./osrm-data:/data
    command: >
      sh -c "
        curl -L -o /data/berlin-latest.osm.pbf https://download.geofabrik.de/europe/germany/berlin-latest.osm.pbf &&
        osrm-extract -p /opt/car.lua /data/berlin-latest.osm.pbf &&
        osrm-partition /data/berlin-latest.osrm &&
        osrm-customize /data/berlin-latest.osrm
      "
    depends_on:
      - osrm-backend

volumes:
  postgres_data:
  redis_data: