global
    maxconn 65535
    daemon
    stats socket /var/run/haproxy.sock mode 600 level admin
    stats timeout 2m

defaults
    mode http
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout tunnel 1h
    log global
    option httplog
    option dontlognull
    option http-server-close

frontend api_frontend
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/ridehailing.pem 2>/dev/null || bind *:80
    
    # ACLs for routing
    acl is_api path_beg /api
    acl is_websocket path_beg /socket.io
    acl is_health path_beg /health
    
    use_backend api_servers if is_api
    use_backend socket_servers if is_websocket
    use_backend api_servers if is_health
    
    default_backend api_servers

backend api_servers
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    server api-1 api-1:3001 check inter 5s rise 2 fall 3
    server api-2 api-2:3001 check inter 5s rise 2 fall 3
    server api-3 api-3:3001 check inter 5s rise 2 fall 3

backend socket_servers
    balance source
    option httpchk GET /health
    timeout tunnel 1h
    timeout server 1h
    
    server socket-1 socket-1:3002 check inter 5s rise 2 fall 3
    server socket-2 socket-2:3002 check inter 5s rise 2 fall 3
    server socket-3 socket-3:3002 check inter 5s rise 2 fall 3

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats auth admin:admin
    stats refresh 10s
