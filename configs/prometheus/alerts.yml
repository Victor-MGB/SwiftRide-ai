groups:
  - name: ride_hailing_alerts
    interval: 30s
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}% for past 5 minutes"

      # High latency alert
      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "95th percentile latency is {{ $value }}s"

      # Redis memory pressure
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis is using {{ $value }}% of available memory"

      # No active drivers alert
      - alert: NoActiveDrivers
        expr: active_drivers_total < 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Low driver availability"
          description: "Only {{ $value }} drivers are online"

      # Database connection pool saturation
      - alert: DatabaseConnectionPoolFull
        expr: pg_stat_database_numbackends > 80
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "PostgreSQL connection pool nearly full"
          description: "Database has {{ $value }} active connections"

      # Surge pricing spikes
      - alert: ExtremeSurgePricing
        expr: avg_surge_multiplier > 3
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Extreme surge pricing detected"
          description: "Average surge multiplier is {{ $value }}x for past 15 minutes"

      # WebSocket connection drops
      - alert: WebSocketDisconnections
        expr: rate(websocket_disconnections_total[5m]) > 100
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High WebSocket disconnection rate"
          description: "{{ $value }} disconnections per second"